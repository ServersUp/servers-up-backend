name: PR tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Run tests (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: go test ./...
      - name: Run tests with race detector
        run: go test -race ./...
